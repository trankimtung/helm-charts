name: Release Charts

on:
  push:
    branches:
      - main
    paths:
      - charts/**
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Log in to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Package and push charts
        run: |
          mkdir -p /tmp/helm-packages
          for chart in charts/*/; do
            name=$(basename "$chart")
            version=$(grep '^version:' "$chart/Chart.yaml" | awk '{print $2}')
            if helm show chart "oci://ghcr.io/${{ github.repository_owner }}/helm-charts/$name" --version "$version" > /dev/null 2>&1; then
              echo "$name:$version already published, skipping."
              continue
            fi
            helm dependency update "$chart"
            helm package "$chart" --destination /tmp/helm-packages
          done
          for pkg in /tmp/helm-packages/*.tgz; do
            helm push "$pkg" oci://ghcr.io/${{ github.repository_owner }}/helm-charts
          done
